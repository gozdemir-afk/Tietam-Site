<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Tietam's Jobs — Private Schedule</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%237c3aed'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=Kaushan+Script&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--accent:#7c3aed;--accent2:#ec4899;--deep:#5b21b6;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:#faf7ff;color:#2b1769;min-height:100vh;}
  .wrap{max-width:900px;margin:0 auto;padding:34px 22px 60px;}
  a{text-decoration:none;}
  .bk-input{width:100%;padding:11px 14px;border-radius:12px;border:2px solid #ece6f7;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:#3a2a6b;background:#fff;margin-bottom:10px;}
  .bk-input:focus{outline:none;border-color:var(--accent);}
  .bk-input::placeholder{color:#a99bcb;font-weight:600;}
  select.bk-input{cursor:pointer;}
  .btn{font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;padding:12px 16px;border-radius:12px;cursor:pointer;}
  .ghost{background:none;border:none;color:#9b8cc0;font-weight:700;font-size:13px;cursor:pointer;}
  .step{font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;color:#8b7bb0;text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px;}
</style>
</head>
<body>
  <div class="wrap">

    <div style="text-align:center; margin-bottom:8px;">
      <a href="index.html" style="display:inline-block; color:#8b7bb0; font-weight:700; font-size:13px; margin-bottom:10px;">← Back to Tietam's site</a>
      <div style="font-size:34px; line-height:1;">📋</div>
      <h1 style="font-family:'Kaushan Script',cursive; font-weight:400; font-size:clamp(34px,7vw,52px); color:var(--deep); margin:2px 0 0;">Tietam's Jobs</h1>
      <div style="font-weight:700; color:#9b8cc0; font-size:14px; margin-top:2px;">Your private schedule — synced from every booking.</div>
    </div>

    <!-- login -->
    <div id="login" style="max-width:380px; margin:24px auto 0; background:#fff; border:2px solid #ece6f7; border-radius:18px; padding:24px; text-align:center; box-shadow:0 10px 24px rgba(91,33,182,.10);">
      <div style="font-size:30px; line-height:1;">🔒</div>
      <div style="font-family:'Fredoka',sans-serif; font-weight:600; font-size:17px; color:var(--deep); margin:4px 0 12px;">Private — for Tietam &amp; family</div>
      <input id="email" class="bk-input" type="email" placeholder="Email" value="T.ladd15@icloud.com" autocomplete="username">
      <input id="pw" class="bk-input" type="password" placeholder="Password" autocomplete="current-password">
      <button id="loginbtn" class="btn" style="width:100%;">Log in</button>
      <div id="err" style="color:#993556; font-weight:700; font-size:13px; margin-top:8px; min-height:16px;"></div>
    </div>

    <!-- app -->
    <div id="app" style="display:none;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin:24px 0 12px; flex-wrap:wrap;">
        <div style="font-family:'Fredoka',sans-serif; font-weight:700; font-size:20px; color:var(--deep);">Upcoming jobs <span id="count" style="font-weight:700; color:#9b8cc0; font-size:15px;"></span></div>
        <div style="display:flex; gap:14px; align-items:center;">
          <button id="refresh" class="ghost">⟳ Refresh</button>
          <button id="logout" class="ghost">Log out</button>
        </div>
      </div>

      <div id="jobs" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:12px;"></div>

      <div style="background:#fff; border:2px solid #ece6f7; border-radius:18px; padding:20px; margin-top:22px; box-shadow:0 10px 24px rgba(91,33,182,.08);">
        <div class="step">➕ Add a job manually</div>
        <input id="j-name" class="bk-input" type="text" placeholder="Customer name">
        <select id="j-hood" class="bk-input"><option value="">Neighborhood</option><option value="Chatham">Chatham</option><option value="Westgate">Westgate</option></select>
        <input id="j-addr" class="bk-input" type="text" placeholder="Address">
        <input id="j-phone" class="bk-input" type="tel" placeholder="Phone number">
        <select id="j-serv" class="bk-input">
          <option value="Dog Walk|$10">Dog Walk — $10</option>
          <option value="Plant Watering|$10">Plant Watering — $10</option>
          <option value="Dog Walk + Plant Watering|$15">Both — $15</option>
        </select>
        <input id="j-date" class="bk-input" type="date">
        <select id="j-time" class="bk-input">
          <option value="">Time</option>
        </select>
        <button id="j-add" class="btn" style="width:100%; margin-top:4px;">Add job</button>
        <div id="j-err" style="color:#993556; font-weight:700; font-size:13px; margin-top:8px; min-height:16px;"></div>
      </div>
    </div>
  </div>

<script>
(function(){
  var SB_URL = "https://aefenzlolwedfbbwcyst.supabase.co";
  var SB_KEY = "sb_publishable_XwrIjyqI_N2KhMrSefUzmA_TRqTxDEn";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);
  (function(){ var sel=document.getElementById('j-time'); for(var t=570;t<=1200;t+=30){ var h=Math.floor(t/60),m=t%60,ap=h<12?'AM':'PM',h12=((h+11)%12)+1; var o=document.createElement('option'); o.textContent=h12+':'+(m<10?'0'+m:m)+' '+ap; sel.appendChild(o); } })();
  function el(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  window.__rm = function(id){
    sb.from('bookings').delete().eq('id', id).then(function(res){
      if(res.error){ alert('Could not remove: ' + res.error.message); } else { loadJobs(); }
    });
  };

  function renderJobs(rows){
    el('count').textContent = rows.length ? '(' + rows.length + ')' : '';
    if(!rows.length){
      el('jobs').innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#a99bcb; font-weight:700; background:#fff; border:2px dashed #ddd2f3; border-radius:18px; padding:26px;">No jobs yet. Bookings will appear here automatically. ✨</div>';
      return;
    }
    el('jobs').innerHTML = rows.map(function(b){
      return '<div style="background:#fff; border:2px solid #ece6f7; border-radius:18px; padding:14px 16px; box-shadow:0 10px 24px rgba(91,33,182,.10); position:relative;">'
        + '<button onclick="__rm(\'' + esc(b.id) + '\')" aria-label="Remove" style="position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%; border:none; background:#f2eefb; color:#8b7bb0; font-weight:800; cursor:pointer; line-height:1;">×</button>'
        + '<div style="font-family:\'Fredoka\',sans-serif; font-weight:700; font-size:16px; color:var(--deep); padding-right:24px;">'+esc(b.name)+'</div>'
        + '<div style="font-weight:700; color:#6a6388; font-size:13px; margin:2px 0 4px;">📍 '+(b.hood?esc(b.hood)+' · ':'')+'<a href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent((b.addr||'')+', Westfield, IN')+'" target="_blank" rel="noopener" style="color:var(--accent); text-decoration:underline;">'+esc(b.addr)+'</a></div>'
        + (b.phone ? '<div style="font-weight:700; color:#6a6388; font-size:13px; margin:0 0 8px;">📞 <a href="tel:'+esc((b.phone||'').replace(/[^0-9+]/g,''))+'" style="color:var(--accent); text-decoration:underline;">'+esc(b.phone)+'</a></div>' : '')
        + '<div style="display:inline-block; font-weight:800; font-size:12px; color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2)); padding:4px 10px; border-radius:999px;">'+esc(b.service)+' · '+esc(b.price)+'</div>'
        + '<div style="font-weight:700; color:#3a2a6b; font-size:13px; margin-top:8px;">📅 '+esc(b.job_date||'(no date)')+'  ·  '+esc(b.slot||'')+'</div>'
      + '</div>';
    }).join('');
  }

  function loadJobs(){
    sb.from('bookings').select('*').order('created_at', { ascending: true }).then(function(res){
      if(res.error){ el('jobs').innerHTML = '<div style="grid-column:1/-1; color:#993556; font-weight:700; text-align:center; padding:20px;">Could not load jobs: ' + esc(res.error.message) + '</div>'; return; }
      renderJobs(res.data || []);
    });
  }

  function niceDate(v){
    if(!v) return '';
    var p = v.split('-'); if(p.length!==3) return v;
    return new Date(+p[0], +p[1]-1, +p[2]).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  }

  function showApp(on){
    el('login').style.display = on ? 'none' : '';
    el('app').style.display = on ? '' : 'none';
    if(on) loadJobs();
  }

  // session check
  sb.auth.getSession().then(function(res){ showApp(!!(res.data && res.data.session)); });

  el('loginbtn').onclick = function(){
    el('err').textContent = 'Logging in…';
    sb.auth.signInWithPassword({ email: (el('email').value||'').trim(), password: el('pw').value }).then(function(res){
      if(res.error){ el('err').textContent = res.error.message; }
      else { el('err').textContent=''; el('pw').value=''; showApp(true); }
    });
  };
  el('pw').onkeydown = function(e){ if(e.key==='Enter') el('loginbtn').onclick(); };
  el('logout').onclick = function(){ sb.auth.signOut().then(function(){ showApp(false); }); };
  el('refresh').onclick = loadJobs;

  el('j-add').onclick = function(){
    var name=(el('j-name').value||'').trim();
    if(!name){ el('j-err').textContent='Add at least a customer name.'; return; }
    var serv=el('j-serv').value.split('|');
    el('j-err').textContent='Adding…';
    sb.from('bookings').insert([{ name:name, hood:el('j-hood').value, addr:(el('j-addr').value||'').trim(), phone:(el('j-phone').value||'').trim(),
        service:serv[0], price:serv[1], job_date:niceDate(el('j-date').value), slot:el('j-time').value }]).then(function(res){
      if(res.error){ el('j-err').textContent = res.error.message; return; }
      el('j-name').value=''; el('j-addr').value=''; el('j-phone').value=''; el('j-hood').value=''; el('j-date').value=''; el('j-time').value=''; el('j-err').textContent='';
      loadJobs();
    });
  };
})();
</script>
</body>
</html>
